name: Terragrunt Manage Stack
run-name: Terragrunt ${{ inputs.run-type }} - Stack ${{ github.event.inputs.stack }} Env ${{ github.event.inputs.environment }}

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Which environment to deploy to'
        required: true
        type: choice
        default: 'dev'
        options:
          - dev
          - prod
      stack:
        description: 'What stack to deploy'
        required: true
        type: choice
        options:
          - infra
          - platform
      run-type:
        description: 'plan, apply, or destroy'
        required: true
        type: choice
        options:
          - plan
          - apply
          - destroy

jobs:
  stack:
    uses: ./.github/workflows/callable-terragrunt-stack.yml
    secrets: inherit
    with:
      module-path: terraform/live/${{ inputs.environment }}/${{ inputs.stack }}
      run-type: ${{ inputs.run-type }}
